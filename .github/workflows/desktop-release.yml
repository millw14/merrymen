name: Desktop release

# Push a tag like `desktop-v0.1.0` and this builds the installers on GitHub's own
# Windows + macOS runners and publishes them to a Release. Also downloadable as
# run artifacts (Actions → the run → Artifacts) even before the release is cut.
# Or trigger manually from the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

permissions:
  contents: write # create the Release + upload assets (uses the built-in token)

jobs:
  build:
    strategy:
      fail-fast: false # one OS failing shouldn't cancel the other
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Root install runs the `prepare` hook, which builds the dashboard (web/.next).
      - name: Install root deps + build dashboard
        shell: bash
        run: npm install

      # Pack merrymen into a tarball (with the prebuilt dashboard + worker) so the
      # desktop app installs a REAL COPY of it — not a `file:` symlink, which a
      # fresh CI npm may create and which electron-builder (asar off) chokes on.
      - name: Pack merrymen (symlink-free copy)
        shell: bash
        run: npm pack

      - name: Install desktop deps
        shell: bash
        working-directory: desktop
        run: |
          npm install                      # electron + electron-builder + deps
          npm install ../merrymen-*.tgz    # replace file:.. with the packed copy

      - name: Build the installer for this OS
        shell: bash
        working-directory: desktop
        run: npx --no-install electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No signing certs → skip auto-discovery so the mac build doesn't fail
          # trying to sign. (Add CSC_LINK/CSC_KEY_PASSWORD later to sign.)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Always available: download the .exe/.dmg from the run itself.
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merrymen-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage

      # On a tag: attach the installers to a public GitHub Release.
      - name: Publish to the Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: merrymen desktop ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          fail_on_unmatched_files: false
          body: |
            **merrymen desktop** — the one-click app. Double-click to install; no terminal, no Node.

            - **Windows:** download the `.exe`. It's **unsigned**, so Windows SmartScreen shows
              "Windows protected your PC" → **More info → Run anyway**. (We'll sign it later.)
            - **macOS:** download the `.dmg`. It's **unsigned/un-notarized**, so right-click the app
              → **Open** (or System Settings → Privacy & Security → Open Anyway) the first time.

            Shares its home (`~/.merrymen`) with the `npm i -g merrymen` CLI.
          files: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.AppImage
