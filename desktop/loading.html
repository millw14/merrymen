<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; background: #0b0b0d; color: #e8e6e1;
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif; overflow: hidden; }
  .wrap { height: 100%; display: grid; place-items: center; text-align: center; }
  .logo { font-size: 40px; }
  h1 { margin: 10px 0 2px; font-size: 20px; letter-spacing: .3px; }
  p { margin: 0; color: #a5a29b; }
  .bar { margin-top: 18px; width: 180px; height: 3px; border-radius: 3px; background: #26262b; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 40%; background: #6f9c4b; border-radius: 3px;
    animation: slide 1.1s ease-in-out infinite; }
  @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
</style>
</head>
<body>
  <div class="wrap">
    <div>
      <div class="logo">🏹</div>
      <h1>merrymen</h1>
      <p>raising the tavern…</p>
      <div class="bar"><i></i></div>
    </div>
  </div>
</body>
</html>
